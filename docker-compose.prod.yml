services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: expense_app
    expose:
      - "8000"
    env_file:
      - .env.prod
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - internal

  db:
    image: postgres:16-alpine
    container_name: expense_db
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/pg_hba.conf:/var/lib/postgresql/data/pg_hba.conf
    env_file:
      - .env.prod
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: expense_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # nginx.conf is swapped by init-ssl.sh after cert is obtained
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - internal

  # Auto-renews cert every 12h
  certbot:
    image: certbot/certbot
    container_name: expense_certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Check renewal every 12 hours (cert only actually renews when <30 days left)
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot --webroot-path=/var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
    restart: unless-stopped

volumes:
  pgdata:
  certbot_www:

networks:
  internal:
    driver: bridge

