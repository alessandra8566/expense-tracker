# Phase 2 — Production HTTPS config (used AFTER cert is obtained via init-ssl.sh)

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name alessandra8566.com www.alessandra8566.com;

    # Still serve ACME challenge for auto-renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — main server
server {
    listen 443 ssl;
    server_name alessandra8566.com www.alessandra8566.com;

    ssl_certificate     /etc/letsencrypt/live/alessandra8566.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alessandra8566.com/privkey.pem;

    # Modern SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (optional but recommended)
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Proxy to FastAPI app
    location / {
        proxy_pass         http://app:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }
}

