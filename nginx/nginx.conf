# ============================================================
# 將以下 location 區塊加入你現有 nginx 的 server { } 設定中
# （通常在 /etc/nginx/sites-available/alessandra8566.com
#   或 /etc/nginx/conf.d/alessandra8566.com.conf）
#
# 前提：你的 server block 已有 HTTPS (443) 設定
# ============================================================

# 加在現有 server { listen 443 ssl; ... } 區塊內：
#
#   location /webhook {
#       proxy_pass         http://127.0.0.1:8000;
#       proxy_set_header   Host $host;
#       proxy_set_header   X-Real-IP $remote_addr;
#       proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
#       proxy_set_header   X-Forwarded-Proto $scheme;
#       proxy_read_timeout 30s;
#   }
#
#   location /health {
#       proxy_pass         http://127.0.0.1:8000;
#       proxy_set_header   Host $host;
#   }
#
# 加完後執行：nginx -t && systemctl reload nginx

# ============================================================
# 完整範例（如果你想用獨立 conf 檔）
# ============================================================
server {
    listen 443 ssl;
    server_name alessandra8566.com www.alessandra8566.com;

    # SSL 設定由你現有的憑證處理（保留原設定，只加 location）

    location /webhook {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /health {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
    }
}

