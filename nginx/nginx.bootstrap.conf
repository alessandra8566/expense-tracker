# Phase 1 — Bootstrap (HTTP only, used BEFORE cert exists)
# Certbot webroot challenge runs through this config.
# After cert is obtained, nginx reloads with the full HTTPS config.
server {
    listen 80;
    server_name alessandra8566.com www.alessandra8566.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # All other traffic → app (HTTP, pre-SSL phase)
    location / {
        proxy_pass         http://app:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto http;
        proxy_read_timeout 30s;
    }
}
